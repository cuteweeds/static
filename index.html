<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brownian Noise</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .panel {
    background: #1b1b1b;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
  }
  .transparent {
    background: #111;
    clear: left;
  }
  .control { margin-bottom: 12px; }
  label { display:flex; justify-content:space-between; font-size:13px; }
  input { width:100%; }
  button {
    width:100%; padding:10px;
    border:none; border-radius:8px;
    background:#4a90e2; color:#fff;
    font-weight:600;
  }
  .nav {
    background: #111;
    color: #4a90e2;
    text-decoration: none;
    font-weight:400;
    font-size: 80%;
  }
</style>
</head>
<body>

<div class="column">

<canvas id="scope" width="300" height="120"></canvas>

  <div class="panel">
    <div class="control">
      <label>Volume <span id="gainVal">0.2</span></label>
      <input id="gain" type="range" min="0" max="1" step="0.01" value="0.2">
    </div>

    <div class="control">
      <label>Drift <span id="driftVal">0.02</span></label>
      <input id="drift" type="range" min="0.001" max="0.1" step="0.001" value="0.02">
    </div>

    <button id="toggle">Start</button>
  </div>

  <a class="nav" href="advanced.html">Advanced</a>
  <div class="panel transparent nav">
  </div>

</div>


  

<script>
let audioCtx, processor, gainNode;
let running = false;

let lastOut = 0;
let lastIn = 0;        // NEW: for DC blocker
let drift = 0.02;

const dcBlock = 0.995; // NEW: high-pass coefficient

const gainSlider = document.getElementById('gain');
const driftSlider = document.getElementById('drift');
const gainVal = document.getElementById('gainVal');
const driftVal = document.getElementById('driftVal');
const toggleBtn = document.getElementById('toggle');

gainVal.textContent = gainSlider.value;
driftVal.textContent = driftSlider.value;

gainSlider.oninput = () => {
  gainVal.textContent = gainSlider.value;
  if (gainNode) gainNode.gain.value = gainSlider.value;
};

driftSlider.oninput = () => {
  drift = parseFloat(driftSlider.value);
  driftVal.textContent = driftSlider.value;
};

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  processor = audioCtx.createScriptProcessor(1024, 1, 1);

  let brownState = 0; // integrator state (true Brownian)
  let x1 = 0;         // previous input to filter
  let y1 = 0;         // previous output from filter
  const R = 0.995;

  processor.onaudioprocess = (e) => {
    const output = e.outputBuffer.getChannelData(0);

    for (let i = 0; i < output.length; i++) {
      const white = Math.random() * 2 - 1;

      // Step 1: Brownian (random walk)
      brownState += drift * white;

      // Step 2: DC blocker (canonical form)
      const x0 = brownState;
      const y0 = x0 - x1 + R * y1;

      // Step 3: shift filter state
      x1 = x0;
      y1 = y0;

      output[i] = y0;
    }
  };

  gainNode = audioCtx.createGain();
  gainNode.gain.value = gainSlider.value;

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;

  processor.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  setupAnalyserRef(analyser);
}

toggleBtn.onclick = async () => {
  if (!running) {
    if (!audioCtx) initAudio();
    await audioCtx.resume();
    running = true;
    toggleBtn.textContent = "Stop";
  } else {
    await audioCtx.suspend();
    running = false;
    toggleBtn.textContent = "Start";
  }
};

const canvas = document.getElementById('scope');
const ctx = canvas.getContext('2d');

let analyserRef; // will be assigned after init

function setupAnalyserRef(node) {
  analyserRef = node;
}

function draw() {
  requestAnimationFrame(draw);
  if (!analyserRef) return;

  const data = new Uint8Array(analyserRef.frequencyBinCount);
  analyserRef.getByteFrequencyData(data);

  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "#4a90e2";
  ctx.beginPath();

  for (let i = 0; i < data.length; i++) {
    const x = Math.log10(1 + i) / Math.log10(data.length) * canvas.width;

    const y = canvas.height - (Math.log10(1 + data[i]) / 2) * canvas.height;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.stroke();
}

draw();
</script>
</body>
</html>
